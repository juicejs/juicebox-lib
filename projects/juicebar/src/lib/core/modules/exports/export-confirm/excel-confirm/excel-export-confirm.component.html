@if (!isLoading) {
    <div class="dialog-header">
        <h2>{{"confirm_export" | translate}}</h2>
    </div>

    <div class="dialog-content p-3">
        <app-form-field appearance="outline" class="w-100">
            <app-label>{{"file_name" | translate}}</app-label>
            <input appInput
                   type="text"
                   [(ngModel)]="fileName"
                   [placeholder]="'file_name' | translate">
        </app-form-field>

        <!-- Future filters implementation -->
        @if (allowFiltersEditOnConfirm && filters) {
            <div class="form-group mt-3">
                <app-export-filters (filtersValueChange)="onFiltersValueChange($event)"
                                    [filters]="filters">
                </app-export-filters>
            </div>
        }
    </div>

    <div class="dialog-actions p-3">
        <button app-button appearance="flat" (click)="cancel()">
            {{"cancel" | translate}}
        </button>
        <button app-button
                appearance="raised"
                color="primary"
                [matPromiseBtn]="promiseBtn"
                (click)="export()">
            {{"download" | translate}}
        </button>
    </div>
}

@if (isLoading) {
    <div class="loading-container">
        <div class="dialog-content text-center p-4">
            <div class="spinner"></div>
            <p class="mt-2">{{"loading" | translate}}</p>
        </div>
    </div>
}
