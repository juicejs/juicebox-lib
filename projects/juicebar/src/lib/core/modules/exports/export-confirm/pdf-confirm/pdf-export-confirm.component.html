<h2 mat-dialog-title>{{"confirm_export" | translate}}</h2>

<mat-dialog-content class="p-3">
    <div class="form-group mb-3">
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>{{"zip_file_name" | translate}}</mat-label>
            <input matInput 
                   type="text" 
                   [(ngModel)]="fileName" 
                   [placeholder]="'zip_file_name' | translate">
        </mat-form-field>
    </div>

    <div class="form-group mb-3">
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>{{"file_name" | translate}}</mat-label>
            <mat-select [(ngModel)]="selectedFileNameProperty"
                       [placeholder]="'file_name' | translate">
                <mat-option *ngFor="let item of fileNameProperties" [value]="item.id">
                    <span>{{item.label | autoLanguage}}</span>
                </mat-option>
            </mat-select>
        </mat-form-field>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="p-3">
    <button mat-button (click)="cancel()">
        {{"cancel" | translate}}
    </button>
    <button mat-raised-button 
            color="primary" 
            [matPromiseBtn]="promiseBtn" 
            (click)="export()">
        {{"download" | translate}}
    </button>
</mat-dialog-actions>
