<div class="dialog-header">
    <h2>{{"confirm_export" | translate}}</h2>
</div>

<div class="dialog-content p-3">
    <div class="form-group mb-3">
        <app-form-field appearance="outline" class="w-100">
            <app-label>{{"zip_file_name" | translate}}</app-label>
            <input appInput
                   type="text"
                   [formControl]="fileNameCtrl"
                   [placeholder]="'zip_file_name' | translate">
        </app-form-field>
    </div>

    <div class="form-group mb-3">
        <app-form-field appearance="outline" class="w-100">
            <app-label>{{"file_name" | translate}}</app-label>
            <app-select [(value)]="selectedFileNameProperty"
                       [placeholder]="'file_name' | translate">
                @for (item of fileNameProperties; track item.id) {
                    <app-option [value]="item.id">
                        <span>{{item.label | autoLanguage}}</span>
                    </app-option>
                }
            </app-select>
        </app-form-field>
    </div>
</div>

<div class="dialog-actions p-3">
    <button app-button appearance="flat" (click)="cancel()">
        {{"cancel" | translate}}
    </button>
    <button app-button
            appearance="raised"
            color="primary"
            [matPromiseBtn]="promiseBtn"
            (click)="export()">
        {{"download" | translate}}
    </button>
</div>
