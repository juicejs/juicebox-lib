<div class="parent">
    <div class="text-right mb-3">
        <button app-button
                appearance="raised"
                color="primary"
                (click)="toWizard()"
                [NoPermissionDisable]="'data-export:role#create'">{{'create' | translate}}
        </button>
    </div>

    <app-data-table
        [rows]="rows"
        [columns]="columns"
        [totalCount]="count"
        [pageSize]="pageSize"
        [pageIndex]="page - 1"
        [sort]="sort"
        (pageChange)="onPageChange($event)"
        (sortChange)="onSort($event)"
        (rowClick)="onSelect($event._id)">

        <ng-template [cellDef]="'columns'" let-row>
            <span [title]="row._columns.length ? getLabels(row._columns, true) : null"
                  [class.has-popover]="row._columns.length"
                  class="ellipsis-inner">
                {{ getLabels(row._columns) || '-' }}
            </span>
        </ng-template>

        <ng-template [cellDef]="'filters'" let-row>
            <span [title]="row._filters.length ? getLabels(row._filters, true) : null"
                  [class.has-popover]="row._filters.length"
                  class="ellipsis-inner">
                {{ getLabels(row._filters) || '-' }}
            </span>
        </ng-template>

        <ng-template [cellDef]="'actions'" let-row>
            <div class="actions-cell" (click)="$event.stopPropagation()">
                <button app-button
                        [disabled]="!row._available_export_strategies.length"
                        [cdkMenuTriggerFor]="exportMenu"
                        [NoPermissionDisable]="row.data_source_key == 'sap-data:strategy' ? 'data-export:role#admin' : 'data-export:role#export'"
                        class="compact-table-button">
                    Export
                    <app-icon [icon]="'arrow_drop_down'"></app-icon>
                </button>
                <ng-template #exportMenu>
                    <div class="menu-panel" cdkMenu>
                        @for (exportStrategy of row._available_export_strategies; track exportStrategy.key) {
                            <button class="menu-item"
                                    cdkMenuItem
                                    (click)="openExportConfirmationModal(row, exportStrategy.key)">
                                {{exportStrategy.name}}
                            </button>
                        }
                    </div>
                </ng-template>

                <button app-button
                        appearance="icon"
                        (click)="delete(row)"
                        [NoPermissionDisable]="'data-export:role#delete'"
                        [title]="'delete' | translate">
                    <app-icon [icon]="'delete'"></app-icon>
                </button>
            </div>
        </ng-template>
    </app-data-table>
</div>
