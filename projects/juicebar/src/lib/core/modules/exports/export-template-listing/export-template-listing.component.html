<div class="parent">
    <div class="text-right mb-3">
        <button mat-raised-button
                color="primary"
                (click)="toWizard()"
                [NoPermissionDisable]="'data-export:role#create'">{{'create' | translate}}
        </button>
    </div>

    <mat-table [dataSource]="dataSource">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
            <mat-header-cell *matHeaderCellDef class="col-width-200">
                {{'name' | translate}}
            </mat-header-cell>
            <mat-cell *matCellDef="let row" class="col-width-200" (click)="onSelect(row._id)">
                {{row.name || '-'}}
            </mat-cell>
        </ng-container>

        <!-- Data Source Column -->
        <ng-container matColumnDef="dataSource">
            <mat-header-cell *matHeaderCellDef class="col-width-200">
                {{'datasource' | translate}}
            </mat-header-cell>
            <mat-cell *matCellDef="let row" class="col-width-200" (click)="onSelect(row._id)">
                {{row._data_source && row._data_source.name ? row._data_source.name : '-'}}
            </mat-cell>
        </ng-container>

        <!-- Columns Column -->
        <ng-container matColumnDef="columns">
            <mat-header-cell *matHeaderCellDef>
                {{'columns' | translate}}
            </mat-header-cell>
            <mat-cell *matCellDef="let row" (click)="onSelect(row._id)">
                <span [matTooltip]="row._columns.length ? getLabels(row._columns, true) : null"
                      [class.has-popover]="row._columns.length">
                    <span>{{getLabels(row._columns)}}</span>
                </span>
            </mat-cell>
        </ng-container>

        <!-- Filters Column -->
        <ng-container matColumnDef="filters">
            <mat-header-cell *matHeaderCellDef>
                {{'filters' | translate}}
            </mat-header-cell>
            <mat-cell *matCellDef="let row" (click)="onSelect(row._id)">
                <span [matTooltip]="row._filters.length ? getLabels(row._filters, true) : null"
                      [class.has-popover]="row._filters.length">
                    <span>{{getLabels(row._filters)}}</span>
                </span>
            </mat-cell>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
            <mat-header-cell *matHeaderCellDef class="col-width-150">
                {{'actions' | translate}}
            </mat-header-cell>
            <mat-cell *matCellDef="let row" class="col-width-150 d-flex text-center align-center">
                <div class="d-flex align-center" (click)="$event.stopPropagation()">
                    <button mat-stroked-button
                            [disabled]="!row._available_export_strategies.length"
                            [matMenuTriggerFor]="exportMenu"
                            [NoPermissionDisable]="row.data_source_key == 'sap-data:strategy' ? 'data-export:role#admin' : 'data-export:role#export'"
                            class="compact-table-button">
                        Export
                        <mat-icon>arrow_drop_down</mat-icon>
                    </button>
                    <mat-menu #exportMenu="matMenu">
                        <button *ngFor="let exportStrategy of row._available_export_strategies"
                                mat-menu-item
                                (click)="openExportConfirmationModal(row, exportStrategy.key)">
                            {{exportStrategy.name}}
                        </button>
                    </mat-menu>

                    <button mat-icon-button
                            (click)="delete(row)"
                            [NoPermissionDisable]="'data-export:role#delete'"
                            matTooltip="{{'delete' | translate}}"
                            class="align-center">
                        <mat-icon>delete</mat-icon>
                    </button>
                </div>
            </mat-cell>
        </ng-container>

        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;" class="clickable-row"></mat-row>
    </mat-table>

    <mat-paginator
        [length]="count"
        [pageSize]="pageSize"
        [pageIndex]="page - 1"
        [pageSizeOptions]="[5, 10, 20, 50]"
        (page)="onPageChange($event)"
        showFirstLastButtons>
    </mat-paginator>
</div>
