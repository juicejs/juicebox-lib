<div class="parent">
    <app-card class="mb-3">
        <app-card-content>
            <div class="alert alert-warning">{{'channel_access_roles_disclaimer' | translate}}</div>
            <div class="alert alert-warning">{{ 'channel_access_refresh_disclaimer' | translate}}</div>
        </app-card-content>
    </app-card>

    <app-card>
        <table cdk-table [dataSource]="rows" class="data-table">
            <!-- Name Column -->
            <ng-container cdkColumnDef="name">
                <th cdk-header-cell *cdkHeaderCellDef>{{'name' | translate}}</th>
                <td cdk-cell *cdkCellDef="let row">
                    <span class="user-select-none">{{row.key | translate}}</span>
                </td>
            </ng-container>

            <!-- Permissions Column -->
            <ng-container cdkColumnDef="permissions">
                <th cdk-header-cell *cdkHeaderCellDef>{{'permissions' | translate}}</th>
                <td cdk-cell *cdkCellDef="let row" class="permissions-cell">
                    <div class="d-flex flex-wrap user-select-none pt-1">
                        @for (permission of allPermissions; track permission.key) {
                            <app-checkbox
                                [(checked)]="row.permissions[permission.key]"
                                (change)="togglePermission(row)"
                                [hasPermissions]="'users:role#updated|update'"
                                class="permission-checkbox mb-1 mr-2">
                                {{permission.key | translate}}
                            </app-checkbox>
                        }
                    </div>
                </td>
            </ng-container>

            <tr cdk-header-row *cdkHeaderRowDef="displayedColumns"></tr>
            <tr cdk-row *cdkRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </app-card>
</div>
