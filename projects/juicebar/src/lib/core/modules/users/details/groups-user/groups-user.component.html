<div class="parent" style="max-height: 100vh; border-radius: 25px;">
    <div class="form-group">

        <form class="form-group">
            <div class="d-flex">
                <mat-form-field appearance="outline" style="width: 400px; padding-right: 24px">
                    <mat-label>{{'organisation' | translate}}</mat-label>
                    <mat-select [(ngModel)]="selectedOrganisation" name="organisations" (selectionChange)="organisationChanged($event.value)">
                        <mat-option *ngFor="let org of organisations" [value]="org._id">
                            {{org.name}}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
        </form>

        <form class="form-group">
            <div class="d-flex">
                <mat-form-field appearance="outline" style="width: 400px; padding-right: 24px">
                    <mat-label>{{'group' | translate}}</mat-label>
                    <mat-select [(ngModel)]="selectedGroup" name="groups">
                        <mat-option *ngFor="let group of groups" [value]="group.key" [disabled]="group.disabled">
                            {{group.name}}
                        </mat-option>
                    </mat-select>
                </mat-form-field>

                <div class="form-group">
                    <button mat-raised-button color="primary" [matPromiseBtn]="promiseBtn"
                            [hasPermissions]="'groups:role#updated|update'"
                            (click)="addGroup()">
                        <mat-icon>add</mat-icon>
                        {{'add' | translate}}
                    </button>
                </div>

                <div class="form-group" style="margin-left: auto;">
                    <button mat-raised-button color="primary" [matPromiseBtn]="promiseBtn"
                            [hasPermissions]="'groups:role#read'"
                            (click)="openGroupEditor()">{{'group editor' | translate}}</button>
                </div>
            </div>
        </form>

    </div>

    <div class="d-flex position-relative">
        <div *ngIf="loading" style="top:2.5rem; left:0; z-index: 999;"
             class="w-100 h-100 d-flex justify-center align-center position-absolute">
            <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
        </div>

        <div *ngIf="!loading" class="col-sm-12 col-md-12" style="max-height: 100vh; padding:0 !important; width: 100%;">

            <mat-table [dataSource]="rows" class="mat-elevation-2 fullscreen">
                <!-- Name Column -->
                <ng-container matColumnDef="name">
                    <mat-header-cell *matHeaderCellDef>{{'name' | translate}}</mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        <strong>{{row.name}}</strong>
                    </mat-cell>
                </ng-container>

                <!-- Roles Column -->
                <ng-container matColumnDef="roles">
                    <mat-header-cell *matHeaderCellDef>{{'roles' | translate}}</mat-header-cell>
                    <mat-cell *matCellDef="let row" class="roles-cell">
                        <div class="row flex-column" style="flex-wrap: wrap; padding-top: 6px;">
                            <label class="ml-3" *ngFor="let role of getGroupRoles(row)">
                                <strong>{{role.role | translate}}:</strong>
                                <span class="pl-2">{{role.permissions}}</span>
                            </label>
                        </div>
                    </mat-cell>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <mat-header-cell *matHeaderCellDef>{{'actions' | translate}}</mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        <button mat-icon-button
                                [hasPermissions]="'users:role#updated|update'" [matPromiseBtn]="promiseBtn"
                                [matTooltip]="'delete' | translate"
                                (click)="deleteGroup(row);">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </mat-cell>
                </ng-container>

                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
            </mat-table>

        </div>
    </div>
</div>
