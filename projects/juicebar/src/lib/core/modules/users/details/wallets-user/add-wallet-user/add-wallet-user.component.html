<mat-dialog-title>
    {{"add_wallet" | translate}}
    <button mat-icon-button mat-dialog-close class="close-button" (click)="cancel()">
        <mat-icon>close</mat-icon>
    </button>
</mat-dialog-title>
<mat-dialog-content>
    <form [formGroup]="walletForm">

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'publisher' | translate}}</mat-label>
            <mat-select formControlName="publisher" [(ngModel)]="publisher" placeholder="{{'choose_publisher' | translate}}">
                <mat-option *ngFor="let pub of publishers" [value]="pub.id">
                    {{pub.title}}
                </mat-option>
            </mat-select>
            <mat-error *ngIf="walletForm.controls['publisher'].hasError('required')">
                You must include a publisher
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{"name" | translate}}*</mat-label>
            <input matInput type="text" placeholder="{{'name' | translate}}"
                   [(ngModel)]="user.wallets.name"
                   formControlName="name">
            <mat-error *ngIf="walletForm.controls['name'].hasError('required')">
                {{"include_name" | translate}}
            </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{"existing_address" | translate}}</mat-label>
            <input matInput type="text" placeholder="{{'leave_empty_for_new_wallet' | translate}}"
                   [(ngModel)]="user.wallets.address"
                   formControlName="address">
            <mat-error *ngIf="walletForm.controls['address'].hasError('addressLength')">
                {{"include_address" | translate}}
            </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{"private_key" | translate}}</mat-label>
            <input matInput type="text" placeholder="{{'leave_empty_for_new_wallet' | translate}}"
                   [(ngModel)]="user.wallets.privateKey"
                   formControlName="privateKey">
            <mat-error *ngIf="walletForm.controls['privateKey'].hasError('required')">
                {{"include_key" | translate}}
            </mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">{{"cancel" | translate}}</button>
    <button mat-raised-button color="primary" (click)="create()" [matPromiseBtn]="updatePromise">{{"add" | translate}}</button>
</mat-dialog-actions>
