<div class="parent" style="max-height: 85vh; border-radius: 25px;">

    <div class="menu-bar">

        <button app-button
                appearance="raised"
                color="primary"
                (click)="openDialog()"
                routerLinkActive="active"
                [hasPermissions]="'assets:role'"
                style="float:right;">
            <app-icon [icon]="'add_circle'"></app-icon>
            {{"add_new" | translate}}
        </button>

    </div>

    <div class="col-sm-12 col-md-12" style="max-height: 85vh;padding:0!important;">
        <app-card>
            <table cdk-table [dataSource]="rows" class="data-table">
                <!-- Name Column -->
                <ng-container cdkColumnDef="name">
                    <th cdk-header-cell *cdkHeaderCellDef>{{"name" | translate}}</th>
                    <td cdk-cell *cdkCellDef="let row">
                        @if (!row.active) {
                            <div>{{row.name}}</div>
                        } @else {
                            <app-icon [icon]="'block'" style="color:red;"></app-icon>
                            {{row.name}}
                        }
                    </td>
                </ng-container>

                <!-- Address Column -->
                <ng-container cdkColumnDef="address">
                    <th cdk-header-cell *cdkHeaderCellDef>{{"address" | translate}}</th>
                    <td cdk-cell *cdkCellDef="let row">{{row.address}}</td>
                </ng-container>

                <tr cdk-header-row *cdkHeaderRowDef="displayedColumns"></tr>
                <tr cdk-row *cdkRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            @if (length > itemsPerPage) {
                <app-paginator
                    [length]="length"
                    [pageSize]="itemsPerPage"
                    [pageSizeOptions]="[5, 10, 20]"
                    [showFirstLastButtons]="true"
                    (page)="changePage($event.pageIndex + 1, config)">
                </app-paginator>
            }
        </app-card>
    </div>
</div>
