<div class="parent">
    <div class="menu-bar" style="justify-content: flex-start; align-items: center; gap: 16px;">
        <app-form-field appearance="outline" style="width: 15rem;">
            <app-label>Select organisation</app-label>
            <app-select [(ngModel)]="selectedOrganisation"
                        name="organisations"
                        (selectionChange)="organisationChanged($event.value)">
                @for (org of organisations; track org._id) {
                    <app-option [value]="org">
                        {{org.name}}
                    </app-option>
                }
            </app-select>
        </app-form-field>

        <button app-button appearance="raised" color="primary" [matPromiseBtn]="promiseBtn"
                [disabled]="!juicebox.hasPermission('users:role#update') || !selectedOrganisation"
                (click)="add()" style="margin-left: 16px;">
            <app-icon [icon]="'add'"></app-icon>
            {{'add' | translate}}
        </button>

        <button app-button appearance="raised" color="primary" [matPromiseBtn]="promiseBtn"
                [hasPermissionsHide]="'users:role#super-admin'"
                (click)="createNewOrg()"
                style="margin-left: auto;">
            <app-icon [icon]="'business'"></app-icon>
            {{'create' | translate}}
        </button>
    </div>

    <div class="col-sm-12 col-md-12" style="max-height: 100vh; padding:0 !important;">

        <table cdk-table [dataSource]="rows" class="data-table fullscreen">
            <!-- Name Column -->
            <ng-container cdkColumnDef="name">
                <th cdk-header-cell *cdkHeaderCellDef>{{'name' | translate}}</th>
                <td cdk-cell *cdkCellDef="let row">
                    <strong>{{row.name}}</strong>
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container cdkColumnDef="actions">
                <th cdk-header-cell *cdkHeaderCellDef>{{'actions' | translate}}</th>
                <td cdk-cell *cdkCellDef="let row">
                    @if (row._id !== loggedInOrganisationId || loggedInUserId !== userId) {
                        <button app-button
                                appearance="icon"
                                [hasPermissions]="'users:role#update'"
                                [title]="'delete' | translate"
                                (click)="delete(row);">
                            <app-icon [icon]="'delete'"></app-icon>
                        </button>
                    }
                </td>
            </ng-container>

            <tr cdk-header-row *cdkHeaderRowDef="displayedColumns"></tr>
            <tr cdk-row *cdkRowDef="let row; columns: displayedColumns;"></tr>
        </table>

    </div>

</div>
