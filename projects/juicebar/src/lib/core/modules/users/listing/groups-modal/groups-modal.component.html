<div app-dialog-content>
    <h2>
        {{'groups_editor' | translate}}
        <button app-button class="close-button" (click)="close()">
            <app-icon icon="close">close</app-icon>
        </button>
    </h2>
    <div class="filter-bar">
        <div class="form-group d-flex" style="width:100%;">
            <app-form-field *ngIf="groups && groups.length" appearance="outline" style="width: 400px; padding-right: 24px">
                <app-label>{{'groups' | translate}}</app-label>
                <app-select (selectionChange)="groupChanged($event.value)">
                    <app-option *ngFor="let group of groups" [value]="group">
                        {{group.name}}
                    </app-option>
                </app-select>
            </app-form-field>

            <button app-button color="primary" [hasPermissions]="'groups:role#super-admin'"
                    (click)="createGroup()">{{'create' | translate}}</button>
        </div>

        <div class="form-group d-flex" *ngIf="this.selectedGroup">
            <app-form-field *ngIf="roles && roles.length && this.selectedGroup" appearance="outline" style="width: 400px; padding-right: 24px">
                <app-label>{{'add_role' | translate}}</app-label>
                <app-select [(value)]="selectedRole" name="role">
                    <app-option *ngFor="let role of roles" [value]="role.key" [disabled]="role.disabled">
                        {{role.name}}
                    </app-option>
                </app-select>
            </app-form-field>

            <button app-button color="primary"
                    appearance="raised"
                    [matPromiseBtn]="promiseBtn"
                    [hasPermissions]="'groups:role#super-admin'"
                    (click)="addRole()">{{'add' | translate}}</button>

            <button *ngIf="selectedGroup" app-button color="primary" class="ml-2" [hasPermissions]="'groups:role#super-admin'"
                    (click)="updateSelectedGroup()">{{'edit' | translate}}</button>
        </div>
    </div>

    <div class="col-12">
        <cdk-table [dataSource]="rows" class="app-elevation-0">
            
            <ng-container cdkColumnDef="name">
                <cdk-header-cell *cdkHeaderCellDef>{{'name' | translate}}</cdk-header-cell>
                <cdk-cell *cdkCellDef="let row">{{row.role | translate}}</cdk-cell>
            </ng-container>

            <ng-container cdkColumnDef="visibility" *ngIf="hasVisibilityFeature">
                <cdk-header-cell *cdkHeaderCellDef>{{'visibility' | translate}}</cdk-header-cell>
                <cdk-cell *cdkCellDef="let row">
                    <div class="d-flex flex-wrap user-select-none pt-1">
                        <app-slide-toggle 
                            [checked]="row.permissions['juicebox:visible']"
                            (change)="toggleVisibility(row, $event.checked)"
                            [disabled]="!hasPermission('groups:role#super-admin')">
                        </app-slide-toggle>
                    </div>
                </cdk-cell>
            </ng-container>

            <ng-container cdkColumnDef="permissions">
                <cdk-header-cell *cdkHeaderCellDef>{{'permissions' | translate}}</cdk-header-cell>
                <cdk-cell *cdkCellDef="let row">
                    <div class="d-flex flex-wrap pt-1">
                        <app-checkbox 
                            *ngFor="let permission of getRolePermissions(row)"
                            [(ngModel)]="row.permissions[permission.key]"
                            [disabled]="!hasPermission('groups:role#super-admin')"
                            (change)="updateGroupRolePermission(row)"
                            class="mb-1 mr-1">
                            {{permission.key}}
                        </app-checkbox>
                    </div>
                </cdk-cell>
            </ng-container>

            <ng-container cdkColumnDef="actions">
                <cdk-header-cell *cdkHeaderCellDef>{{'actions' | translate}}</cdk-header-cell>
                <cdk-cell *cdkCellDef="let row">
                    <button app-button
                            [hasPermissions]="'groups:role#super-admin'"
                            appearance="raised"
                            [matPromiseBtn]="promiseBtn"
                            [appTooltip]="'delete' | translate"
                            (click)="deleteRole(row);">
                        <app-icon icon="">delete</app-icon>
                    </button>
                </cdk-cell>
            </ng-container>
            
            <cdk-header-row *cdkHeaderRowDef="displayedColumns"></cdk-header-row>
            <cdk-row *cdkRowDef="let row; columns: displayedColumns;"></cdk-row>
        </cdk-table>

        <app-paginator 
            *ngIf="count > itemsPerPage"
            [length]="count"
            [pageSize]="itemsPerPage"
            [pageSizeOptions]="[5, 10, 25, 100]"
            (page)="changePage($event, config)">
        </app-paginator>
    </div>
</div>

<div app-actions align="end">
    <button app-button (click)="close()">
        {{"close" | translate}}
    </button>
</div>
