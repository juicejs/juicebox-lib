<h2>
    {{'login_as_another_user' | translate}}
    <button app-button class="close-button" (click)="close()">
        <app-icon icon="close">close</app-icon>
    </button>
</h2>

<app-dialog-content>
    <form class="d-flex flex-column" [formGroup]="twoFaForm">
        <app-form-field appearance="outline" class="full-width">
            <app-label>{{'two_factor_authorisation_code' | translate}}</app-label>
            <input appInput maxlength="6" formControlName="code" 
                   placeholder="Enter 6-digit code">
            <app-error *ngIf="twoFaForm.get('code')?.hasError('required')">
                Code is required
            </app-error>
            <app-error *ngIf="twoFaForm.get('code')?.hasError('pattern')">
                Code must contain only numbers
            </app-error>
            <app-error *ngIf="twoFaForm.get('code')?.hasError('minlength') || twoFaForm.get('code')?.hasError('maxlength')">
                Code must be exactly 6 digits
            </app-error>
        </app-form-field>

        <app-form-field *ngIf="organisations.length" appearance="outline" class="full-width">
            <app-label>{{'select_organisation' | translate}}</app-label>
            <app-select formControlName="organisation" 
                        placeholder="{{'organisation' | translate}}">
                <app-option *ngFor="let org of organisations" [value]="org._id">
                    {{org.name}}
                </app-option>
            </app-select>
        </app-form-field>
    </form>
</app-dialog-content>

<app-dialog-actions align="end">
    <button app-button (click)="close()">
        {{"cancel" | translate}}
    </button>
    <button app-button color="primary" (click)="login()"
            appearance="raised"
            [matPromiseBtn]="promiseBtn"
            [disabled]="!twoFaForm.valid">
        {{"login" | translate}}
    </button>
</app-dialog-actions>
