<div class="forgot-modal-wrapper">
<mat-dialog-title>{{'forgot_password' | translate}}</mat-dialog-title>

<mat-dialog-content>
    <form [formGroup]="forgotPasswordForm" class="p-0 m-0">
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>{{'email' | translate}}*</mat-label>
            <input matInput
                   formControlName="email"
                   placeholder="{{'enter_email' | translate}}"
                   type="email">
            <mat-error *ngIf="forgotPasswordForm.controls['email'].hasError('required')">
                {{'must_include_email' | translate}}
            </mat-error>
            <mat-error *ngIf="forgotPasswordForm.controls['email'].hasError('email')">
                {{'must_include_valid_email' | translate}}
            </mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()" type="button">
        {{'cancel' | translate}}
    </button>
    <button mat-raised-button 
            color="primary"
            (click)="forgotPassword()"
            [disabled]="!forgotPasswordForm.valid"
            [matPromiseBtn]="promiseBtn"
            type="submit">
        {{'submit' | translate}}
    </button>
</mat-dialog-actions>
</div>
