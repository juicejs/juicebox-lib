<div class="login-page">
    <form [formGroup]="resetPasswordForm" class="login-form">
        <img class="mw-100 mb-2" src="assets/images/login_picture.png">
        <p>{{'enter_new_password' | translate}}:</p>
        <div class="form-group">
            <label>{{"password" | translate}}:</label>
            <input formControlName="password" class="form-control" type="password" [autocomplete]="'new-password'">
        </div>
        <div class="form-group">
            <label>{{"pass_repeat" | translate}}:</label>
            <input formControlName="repeatPassword" class="form-control" type="password" [autocomplete]="'new-password'">
        </div>

        <div class="form-control-feedback alert alert-danger" *ngIf="resetPasswordForm.controls['password'].errors && resetPasswordForm.controls['password'].touched">
            <div *ngIf="resetPasswordForm.controls['password'].errors['required']">
                {{"pass_required" | translate}}</div>
            <div *ngIf="resetPasswordForm.controls['password'].errors['password']">
                {{"pass_regex_error" | translate}}</div>
        </div>

        <div class="form-control-feedback alert alert-danger" *ngIf="resetPasswordForm && resetPasswordForm.errors && resetPasswordForm.errors['mismatch'] && resetPasswordForm.controls['repeatPassword'].touched">
            {{"pass_not_same" | translate}}
        </div>

        <div class="d-flex py-2 reset-password">
            <div class="d-flex flex-column text-center">
                <button mat-raised-button color="primary"
                        (click)="generateRandomPassword()">{{"generate_random" | translate}}
                </button>
                <span *ngIf="randomPassword" class="m-2">{{randomPassword}}</span>
            </div>
            <button mat-raised-button color="primary" class="ml-auto mb-auto" [matPromiseBtn]="promiseBtn"
                    (click)="resetPassword()">{{"pass_save" | translate}}
            </button>
        </div>
    </form>
</div>
