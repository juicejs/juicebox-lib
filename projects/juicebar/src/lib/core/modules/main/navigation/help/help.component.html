<app-dialog-title>{{'help' | translate}}</app-dialog-title>

<app-dialog-content>
    <div class="help-file">
      <h4 class="section-title">{{'help_document' | translate}}</h4>
      <div class="file-upload-section">
        <input #input
               (change)="file = $event.target.files[0]"
               type="file"
               class="file-input"
               [hasPermissions]="'juicebox:role#edit-help-document'"
               accept="application/pdf">
        <button app-button
                appearance="raised"
                color="primary"
                (click)="uploadFile(input)"
                [hasPermissions]="'juicebox:role#edit-help-document'"
                [matPromiseBtn]="promiseBtn">
          {{'upload' | translate}}
        </button>
      </div>

      <div class="file-actions">
        @if (fileInfo) {
          <div class="file-name">
            {{fileInfo.name}}{{fileInfo.extension}}
          </div>
        } @else {
          <span class="no-file">-</span>
        }

        <div class="action-buttons">
          <button app-button
                  color="primary"
                  (click)="downloadFile()"
                  [disabled]="!fileInfo">
            Download
          </button>
          <button app-button
                  color="primary"
                  (click)="deleteFile()"
                  [hasPermissions]="'juicebox:role#edit-help-document'">
            {{'delete' | translate}}
          </button>
        </div>
      </div>
    </div>

    <app-divider class="section-divider"></app-divider>

    <div class="help-text">
      <h4 class="section-title">{{'help_text' | translate}}</h4>
      <div class="textarea-container">
        <app-form-field appearance="outline" class="full-width">
          <app-label>{{'help_text' | translate}}</app-label>
          <textarea appInput
                    #text
                    [formControl]="helpDataCtrl"
                    rows="6"
                    placeholder="Enter help text..."></textarea>
        </app-form-field>

        <button app-button
                appearance="raised"
                color="primary"
                type="submit"
                class="update-button"
                [hasPermissions]="'juicebox:role#edit-help-document'"
                (click)="addHelpText(text.value)"
                [matPromiseBtn]="promiseBtn">
          {{ 'update' | translate }}
        </button>
      </div>
    </div>
</app-dialog-content>

<app-dialog-actions align="end">
  <button app-button
          (click)="dialogRef.close(helpTextUpdated)">
    {{'close' | translate}}
  </button>
</app-dialog-actions>
