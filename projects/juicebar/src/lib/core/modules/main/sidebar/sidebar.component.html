<app-sidenav-container class="modern-sidebar-container"
                       [class.collapsed]="juicebox.collapsed">

  <app-sidenav opened mode="side" class="modern-sidebar">

    <!-- Logo Section -->
    <div class="sidebar-header" [class.collapsed]="juicebox.collapsed">
      <div class="logo-container">
        <img [src]="organisationLogo" [alt]="'Company Logo'" class="company-logo">
      </div>
    </div>

    <!-- Navigation Menu with Drag & Drop -->
    <div class="sidebar-menu" 
         cdkDropList
         (cdkDropListDropped)="onMenuDrop($event)"
         [cdkDropListDisabled]="!juicebox.getOptions().sidebarPermissions">
         
      <div class="menu-section">
        @for (menuItem of this.menu; track trackByRole($index, menuItem)) {
          <div class="menu-item-container"
             cdkDrag
             [cdkDragDisabled]="!juicebox.getOptions().sidebarPermissions"
             (cdkDragStarted)="onMenuDragStarted()">
             
          <div class="menu-item"
               [class.active]="isActiveRoute(menuItem.router)"
               [class.dragging]="isDragging"
               (click)="menuItemClicked($event, menuItem.router)"
               [appTooltip]="juicebox.collapsed ? menuItem.label : ''"
               appTooltipPosition="right">
               
            <div class="menu-item-content">
              <div class="menu-icon-container">
                @if (!isDragging) {
                  <app-icon class="menu-icon" [icon]="getMatIcon(menuItem.icon)"></app-icon>
                }
                @if (isDragging) {
                  <app-icon class="drag-handle" [icon]="'drag_indicator'"></app-icon>
                }
              </div>
              
              <span class="menu-label" [class.collapsed]="juicebox.collapsed">
                {{menuItem.label}}
              </span>
            </div>
          </div>
          </div>
        }
      </div>
    </div>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <button app-button
              appearance="icon"
              class="collapse-btn"
              (click)="collapse()"
              [appTooltip]="juicebox.collapsed ? 'Expand sidebar' : 'Collapse sidebar'"
              appTooltipPosition="right">
        <app-icon class="collapse-icon" [icon]="juicebox.collapsed ? 'menu_open' : 'menu'"></app-icon>
      </button>
    </div>

  </app-sidenav>

</app-sidenav-container>

<!-- Profile Picture Dialog -->
<ng-template #picture let-modal>
  <app-dialog-content>
    <app-dialog-title>
      {{userName}} - {{'profile_picture' | translate}}
    </app-dialog-title>

    <div class="profile-upload-section">
      <input (change)="fileChangeEvent($event)"
             accept="image/*"
             type="file"
             class="file-input"/>

      @if (imageChangedEvent) {
      <div class="cropper-section">
        <image-cropper
          [imageChangedEvent]="imageChangedEvent"
          [maintainAspectRatio]="true"
          [aspectRatio]="1"
          [resizeToWidth]="128"
          [resizeToHeight]="128"
          [roundCropper]="true"
          format="png"
          (imageCropped)="imageCropped($event)">
        </image-cropper>
      </div>
      }

      @if (croppedImage) {
      <div class="preview-section">
        <div class="user-logo">
          <img [src]="croppedImage" class="user-placeholder" alt="Profile Preview" />
        </div>
      </div>
      }
    </div>
  </app-dialog-content>

  <app-dialog-actions align="end">
    <button app-button (click)="modal.close()">
      {{'cancel' | translate}}
    </button>
    <button app-button
            appearance="raised"
            color="primary"
            (click)="updateProfilePicture(modal)"
            [promiseBtn]="promiseBtn"
            [disabled]="!croppedImage">
      {{'save' | translate}}
    </button>
  </app-dialog-actions>
</ng-template>
