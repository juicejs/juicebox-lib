<div class="filter-bar">
  @for (filter of filters(); track filter.key) {
    <div class="filter-button" [class.active]="filter.selectedValue">
      <button app-button
              appearance="stroked"
              cdkOverlayOrigin
              #trigger="cdkOverlayOrigin"
              class="filter-btn"
              (click)="toggle(filter.key)">
        <app-icon [icon]="filter.icon" class="filter-icon"></app-icon>
        <span class="filter-label">{{ getDisplayValue(filter) }}</span>
        <app-icon [icon]="'arrow_drop_down'" class="dropdown-icon"></app-icon>
      </button>

      <ng-template cdkConnectedOverlay
                   [cdkConnectedOverlayOrigin]="trigger"
                   [cdkConnectedOverlayOpen]="isOpen(filter.key)"
                   [cdkConnectedOverlayHasBackdrop]="true"
                   cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
                   (backdropClick)="close()">
        <div class="filter-panel">
          <div class="autocomplete-search-container">
            <app-icon [icon]="'search'" class="search-icon"></app-icon>
            <input class="autocomplete-search-input"
                   [placeholder]="filter.placeholder"
                   (input)="onFilterSearch(filter.key, $any($event.target).value)" />
          </div>

          <button class="filter-option" type="button"
                  (click)="onFilterSelected(filter.key, null)">
            Clear
          </button>

          @for (option of filter.options; track option) {
            <button class="filter-option" type="button"
                    (click)="onFilterSelected(filter.key, option)">
              {{ optionLabel(option, filter) }}
            </button>
          }

          @if (filter.options.length === 0) {
            <div class="filter-option disabled">No results found</div>
          }
        </div>
      </ng-template>
    </div>
  }
</div>
