<form [formGroup]="radioGroupForm">
    <mat-button-toggle-group name="pageSize" formControlName="pageSize" 
                             (change)="selected($event.value)" 
                             appearance="standard">
        <mat-button-toggle *ngFor="let size of _sizes" [value]="size">
            {{size}}
        </mat-button-toggle>
    </mat-button-toggle-group>
</form>
