<div class="page-size-group">
    @for (size of _sizes(); track size) {
        <button app-button
                [appearance]="pageSize() === size ? 'raised' : 'stroked'"
                [color]="pageSize() === size ? 'primary' : 'basic'"
                (click)="select(size)">
            {{size}}
        </button>
    }
</div>
