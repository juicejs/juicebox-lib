<div *ngIf="strikethrough">
<span style="color:#6c1f00;" *ngIf="fallback">[{{fallback}}]</span><span class="ml-1">{{clearText}}</span>
</div>
<div *ngIf="!strikethrough">
    <span style="color:#6c1f00; text-decoration: line-through;" *ngIf="fallback"> [{{fallback}}]</span><span class="ml-1" style="text-decoration: line-through;">{{clearText}}</span>
</div>
