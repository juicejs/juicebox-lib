<div class="app-select" cdkOverlayOrigin #trigger="cdkOverlayOrigin">
  <div class="app-select-trigger"
       [class.disabled]="disabled()"
       [class.open]="isOpen()"
       (click)="toggle()"
       role="combobox"
       [attr.aria-expanded]="isOpen()"
       [attr.aria-disabled]="disabled()">
    <span class="app-select-value">{{ displayValue() || placeholder() }}</span>
    <span class="app-select-arrow">▼</span>
  </div>
</div>

<!-- Hidden content slot — options are queried via contentChildren, not rendered here -->
<div hidden>
  <ng-content></ng-content>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  (backdropClick)="close()"
  (detach)="close()">
  <div class="app-select-panel" role="listbox">
    @for (option of getOptions(); track option.value()) {
      <div class="app-option"
           [class.app-option-selected]="isSelected(option)"
           [class.app-option-disabled]="option.disabled()"
           (click)="select(option)"
           role="option"
           [attr.aria-selected]="isSelected(option)"
           [attr.aria-disabled]="option.disabled()">
        {{ option.getLabel() }}
      </div>
    }
  </div>
</ng-template>
